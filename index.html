<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/azaman-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azaman Business Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // Prevent theme flash: apply dark/light class before first paint
      (function() {
        try {
          var saved = localStorage.getItem('az-dark-mode');
          var dark = saved !== null ? JSON.parse(saved) : false; // light is the real default
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
